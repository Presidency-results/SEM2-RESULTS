<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presidency Results </title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#f3f5f8;
}

.header{
    background:#002147;
    color:white;
    padding:20px;
    text-align:center;
}

.subheader{
    text-align:center;
    padding:10px;
    background:#ffffff;
    border-bottom:1px solid #ddd;
}

.login-container{
    width:400px;
    max-width:90%;
    margin:60px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.login-container h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:10px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    background:#002147;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    opacity:0.9;
}

#error{
    color:red;
    text-align:center;
    margin-top:15px;
}

#resultPage{
    display:none;
    width:100%;
    height:100vh;
}

#resultViewer{
    width:100%;
    height:100vh;
    border:none;
}
</style>
</head>

<body>

<div class="header">
    <h1>Presidency Results </h1>
</div>

<div class="subheader">
    Student Result Access Portal 
</div>

<div class="login-container" id="loginPage">

    <h2>Student Login</h2>

    <label>Roll Number</label>
    <input type="text" id="rollno" placeholder="Enter Roll Number">

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">View Result</button>

    <p id="error"></p>

</div>

<div id="resultPage">
    <iframe
        id="resultViewer"
        src="Result Sheet sem 2.pdf.pdf">
    </iframe>
</div>

<script>

const VALID_ROLL = "20251ISE0118";
const VALID_PASSWORD = "01062006";

function login(){

    const roll =
        document.getElementById("rollno").value.trim();

    const password =
        document.getElementById("password").value.trim();

    if(
        roll === VALID_ROLL &&
        password === VALID_PASSWORD
    ){

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("resultPage").style.display = "block";

    }else{

        document.getElementById("error").innerText =
            "Invalid Roll Number or Password";

    }
}

</script>

</body>
</html>
